name: Deploy and Run on Self-Hosted

on:
  push:
    branches:
      - master # Change this to match your default branch if needed
  workflow_dispatch: # Allow a manual redeploy of the current branch from the Actions tab

# Never let two deploys race on the same host over `docker compose up`.
# Queue instead of cancelling so an in-flight deploy always finishes cleanly.
concurrency:
  group: deploy-server-poke-io
  cancel-in-progress: false

jobs:
  run-app:
    runs-on: self-hosted

    env:
      IMAGE_NAME: server-poke-io
      CONTAINER_NAME: server-poke-io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        env:
          ENV_SECRET: ${{ secrets.ENV_SECRET }}
        run: |
          # Securely write the secret to the .env file
          echo "$ENV_SECRET" > .env

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t "$IMAGE_NAME:${{ github.sha }}" \
            -t "$IMAGE_NAME:latest" \
            .

      - name: Deploy with Docker Compose
        run: |
          # Remove any container left over from the old `docker run` deploy so it
          # doesn't collide with the compose service's container_name.
          if ! docker inspect -f '{{ index .Config.Labels "com.docker.compose.project" }}' "$CONTAINER_NAME" 2>/dev/null | grep -q .; then
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          fi

          # compose.yml references image: server-poke-io:latest, which we just built.
          docker compose up -d --force-recreate --remove-orphans

      - name: Show container status
        run: |
          sleep 3
          docker compose ps

          if ! docker ps --filter "name=$CONTAINER_NAME" --filter "status=running" --format '{{.Names}}' | grep -q "^$CONTAINER_NAME$"; then
            docker compose logs
            exit 1
          fi

      - name: Verify deployed version
        # Fail the deploy unless the running container reports the SHA we just
        # built. This is what makes "prod silently out of date" impossible to
        # miss: a stale or crash-looping container turns the run red.
        run: |
          EXPECTED="${{ github.sha }}"
          DEPLOYED=""
          for i in $(seq 1 15); do
            DEPLOYED=$(curl -fsS http://localhost:3001/version 2>/dev/null \
              | sed -n 's/.*"sha":"\([^"]*\)".*/\1/p') || true
            if [ -n "$DEPLOYED" ]; then break; fi
            sleep 2
          done
          echo "Expected SHA: $EXPECTED"
          echo "Deployed SHA: ${DEPLOYED:-<none>}"
          if [ "$DEPLOYED" != "$EXPECTED" ]; then
            echo "::error::Prod is not running $EXPECTED (got '${DEPLOYED:-<none>}'). The image did not update correctly."
            docker compose logs --tail=80
            exit 1
          fi
          echo "✅ Verified: prod is running $EXPECTED"

      - name: Prune old images
        if: always()
        run: docker image prune -f
