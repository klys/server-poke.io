name: Deploy and Run on Self-Hosted

on:
  push:
    branches:
      - master # Change this to match your default branch if needed

jobs:
  run-app:
    runs-on: self-hosted

    env:
      IMAGE_NAME: server-poke-io
      CONTAINER_NAME: server-poke-io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        env:
          ENV_SECRET: ${{ secrets.ENV_SECRET }}
        run: |
          # Securely write the secret to the .env file
          echo "$ENV_SECRET" > .env

      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME:${{ github.sha }}" -t "$IMAGE_NAME:latest" .

      - name: Deploy with Docker Compose
        run: |
          # Remove any container left over from the old `docker run` deploy so it
          # doesn't collide with the compose service's container_name.
          if ! docker inspect -f '{{ index .Config.Labels "com.docker.compose.project" }}' "$CONTAINER_NAME" 2>/dev/null | grep -q .; then
            docker rm -f "$CONTAINER_NAME" 2>/dev/null || true
          fi

          # compose.yml references image: server-poke-io:latest, which we just built.
          docker compose up -d --force-recreate --remove-orphans

      - name: Show container status
        run: |
          sleep 3
          docker compose ps

          if ! docker ps --filter "name=$CONTAINER_NAME" --filter "status=running" --format '{{.Names}}' | grep -q "^$CONTAINER_NAME$"; then
            docker compose logs
            exit 1
          fi

      - name: Prune old images
        if: always()
        run: docker image prune -f
